<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Captura de Notas de Radio</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    /* --- DISEÑO EDITORIAL INSPIRADO EN CAPTURA DE PORTADAS --- */
    :root {
      --color-fondo-pagina: #fcfcfc;
      --color-fondo-form: #ffffff;
      --color-primary: #15173D;
      --color-primary-hover: #21255e;
      --color-secondary: #15173D;
      --color-secondary-hover: #21255e;
      --color-danger: #d90000;
      --color-danger-hover: #a10000;
      --color-success: #15173D;
      --color-error: #d90000;
      --color-text: #15173D;
      --color-border: #15173D;
      --color-input-bg: #ffffff;
      --color-dark-text: #15173D;
      --color-light-text: #ffffff;
      --radius: 0px; /* Bordes rectos */
      --table-zoom: 1;
      --color-blocked-bg: #eaecf0;
    }

    /* Variables de Tema Oscuro */
    body.dark-mode {
      --color-fondo-pagina: #1a1a1a;
      --color-fondo-form: #242424;
      --color-text: #e0e0e0;
      --color-border: #444;
      --color-primary: #e0e0e0;
      --color-primary-hover: #ffffff;
      --color-secondary: #e0e0e0;
      --color-secondary-hover: #ffffff;
      --color-success: #e0e0e0;
      --color-blocked-bg: #2d2d2d;
      --color-input-bg: #2d2d2d;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0 auto;
      max-width: 1440px;
      padding: 40px;
      background: var(--color-fondo-pagina);
      color: var(--color-text);
      letter-spacing: -0.3px;
      transition: background-color 0.3s, color 0.3s;
    }

    /* --- HEADER ESTILO PERIÓDICO --- */
    header {
      border-top: 5px solid var(--color-text);
      border-bottom: 5px solid var(--color-text);
      padding: 24px 0;
      margin-bottom: 32px;
      background: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .theme-toggle-btn {
      background: transparent;
      border: 2px solid var(--color-border);
      color: var(--color-text);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .theme-toggle-btn:hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
      transform: scale(1.1);
    }

    .theme-toggle-btn i {
      transition: transform 0.5s ease;
    }

    body.dark-mode .theme-toggle-btn i {
      transform: rotate(360deg);
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -1.5px;
      color: var(--color-text);
    }

    header h1::after {
      content: '®';
      font-size: 1.5rem;
      vertical-align: super;
      font-weight: 400;
    }

    header img {
      height: 80px;
      width: auto;
    }

    /* --- BLOQUE ARTÍSTICO (3 CÍRCULOS) --- */
    .art-box {
      background: var(--color-text);
      width: 100%;
      height: 120px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .art-circle {
      width: 150px;
      height: 150px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      position: absolute;
      top: -15px;
    }

    .art-circle:nth-child(1) { left: calc(50% - 225px); }
    .art-circle:nth-child(2) { left: calc(50% - 75px); }
    .art-circle:nth-child(3) { left: calc(50% + 75px); }

    /* --- FORMULARIO GRID --- */
    form {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr;
      gap: 16px 24px;
      max-width: 1200px;
      margin: 0 auto 40px auto;
      padding: 0;
      background: transparent;
    }

    .form-logo-container {
      display: none; /* Ocultamos el logo extra del form para limpiar diseño */
    }

    label {
      font-weight: 700;
      align-self: center;
      font-size: 1.1rem;
      color: var(--color-text);
    }

    .campo {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    label[for="titular"],
    .campo:has(#titular) {
      grid-column: 1 / span 4;
    }

    label[for="radiodifusora"],
    .campo:has(#radiodifusora) {
      grid-column: 1 / span 4;
    }
    
    .form-logo-container {
      grid-column: 1 / span 4;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--color-border);
    }

    .form-logo-container img {
      height: 80px;
      width: auto;
    }

    .campo > input[type="text"],
    .campo > input[type="date"],
    .campo > textarea {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--color-text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      overflow: hidden; /* Ocultar scroll en texterea elástico */
      resize: none; /* Desactivar redimensionado manual */
    }

    .campo > input:focus,
    .campo > textarea:focus {
      background-color: var(--color-text);
      color: #fff;
    }

    /* Estilo del botón 🔽 */
    .campo button[type="button"] {
      padding: 10px 12px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    .campo button[type="button"]:hover {
      background: var(--color-text);
      color: #fff;
    }

    /* --- SUGERENCIAS --- */
    .sugerencias {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      border: 2px solid var(--color-border);
      background: #fff;
      color: var(--color-text);
      max-height: 220px;
      overflow-y: auto;
      z-index: 1000; /* Prioridad alta */
      border-radius: var(--radius);
      border-top: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .sugerencia {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .sugerencia:hover,
    .sugerencia.resaltado {
      background: var(--color-text);
      color: #fff;
    }

    /* --- BLOQUEO --- */
    .bloqueado {
      background: var(--color-blocked-bg) !important;
      cursor: not-allowed;
      color: var(--color-text) !important;
      opacity: 0.8;
    }

    /* --- BOTONES DE ACCIÓN --- */
    .button-group-form {
      grid-column: 1 / span 4;
      display: flex;
      gap: 14px;
      justify-content: flex-start;
      margin-top: 16px;
      flex-wrap: wrap;
      border-top: 2px solid var(--color-border);
      padding-top: 24px;
    }

    button {
      padding: 12px 18px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 700;
      color: var(--color-text);
      background: transparent;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: var(--color-text);
      color: #fff;
    }

    #btnEliminar {
      border-color: var(--color-error);
      color: var(--color-error);
    }

    #btnEliminar:hover {
      background: var(--color-error);
      color: #fff;
    }

    #btnBorrarTodo {
      border-color: var(--color-error);
      color: var(--color-error);
    }

    #btnBorrarTodo:hover {
      background: var(--color-error);
      color: #fff;
    }

    /* --- TABLA --- */
    /* Zoom Controls */
    .table-header-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 40px;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--color-text);
      padding-bottom: 10px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .table-header-container h2 {
      margin: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-zoom {
      padding: 6px 10px;
      border: 2px solid var(--color-border);
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 35px;
    }

    .btn-zoom:hover {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    .zoom-display {
      font-weight: bold;
      min-width: 50px;
      text-align: center;
      font-size: 0.9rem;
      cursor: pointer;
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-top: 48px;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--color-text);
      padding-bottom: 10px;
      display: inline-block;
      color: var(--color-text);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 0;
      background: #fff;
      border: 2px solid var(--color-border);
    }

    th, td {
      padding: 12px 10px;
      border: 1px solid var(--color-border);
      text-align: left;
      color: var(--color-text);
    }

    th {
      background: var(--color-fondo-form);
      font-weight: 800;
      text-transform: uppercase;
      font-size: calc(0.85rem * var(--table-zoom));
      position: sticky;
      top: 0;
      z-index: 10;
    }

    td {
      font-size: calc(0.95rem * var(--table-zoom));
    }

    tbody tr:hover td {
      background: var(--color-text);
      color: var(--color-fondo-pagina);
    }

    body:not(.dark-mode) #tablaNotas tr:hover td {
      color: #fff;
    }

    .editando {
      background-color: var(--color-text) !important;
      color: var(--color-fondo-pagina) !important;
    }

    .editando td {
      color: var(--color-fondo-pagina) !important;
    }

    /* Resaltado para temas vacíos (Estilo Notas) */
    #tablaNotas tr.alerta-vacio-row td {
      background-color: #fff0f0;
      color: #d90000;
    }

    body.dark-mode #tablaNotas tr.alerta-vacio-row td {
      background-color: #3d1a1a;
      color: #ffbaba;
    }

    /* --- ACCIONES GLOBALES Y BUSCADOR --- */
    .actions-group {
      display: flex;
      gap: 14px;
      margin: 24px 0;
    }

    .buscador-container {
      margin: 32px 0 16px;
      position: relative;
      max-width: 420px;
    }

    #buscador {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--color-text);
      font-family: inherit;
      font-size: 1rem;
    }

    .buscador-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text);
    }

    /* --- NOTIFICACIONES (TOAST) --- */
    #messageContainer {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast-message {
      padding: 16px 24px;
      border: 2px solid var(--color-border);
      background: #fff;
      color: var(--color-text);
      font-weight: bold;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
      transition: opacity 0.3s ease, transform 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 1;
      transform: translateX(0);
    }

    .toast-message.hide {
      opacity: 0;
      transform: translateX(50px);
    }

    .toast-message.success { border-left: 8px solid #00a82d; }
    .toast-message.error { border-left: 8px solid var(--color-error); }

    /* --- RESPONSIVE --- */
    @media (max-width: 1024px) {
      form { grid-template-columns: auto 1fr; }
      .button-group-form { grid-column: 1 / span 2; }
    }

    @media (max-width: 768px) {
      header { flex-direction: column; text-align: center; }
      header h1 { font-size: 2.5rem; }
      .art-box { display: none; }
      form { grid-template-columns: 1fr; }
      .button-group-form { grid-column: 1; flex-direction: column; }
      label { margin-bottom: -10px; }
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { position: absolute; top: -9999px; left: -9999px; }
      tr { border: 2px solid var(--color-border); margin-bottom: 12px; }
      td { border: none; border-bottom: 1px solid #eee; position: relative; padding-left: 50%; text-align: right; }
      td:before { content: attr(data-label); position: absolute; left: 10px; width: 45%; text-align: left; font-weight: 800; }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Captura de Notas de Radio</h1>
      <p>Ladies and gentlemen we are floating in space</p>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
      <button type="button" class="theme-toggle-btn" id="themeToggle" title="Cambiar tema">
        <i class="fa-solid fa-lightbulb"></i>
      </button>
      <img src="./logo.png" alt="Logotipo institucional">
    </div>
  </header>

  <div class="art-box">
    <div class="art-circle"></div>
    <div class="art-circle"></div>
    <div class="art-circle"></div>
  </div>

  <div id="messageContainer"></div>

  <form id="formCaptura">
    <div class="form-logo-container">
      <img src="./logo.png" alt="Logotipo institucional">
    </div>
    <label for="usuario">Usuario:</label>
    <div class="campo">
      <input type="text" id="usuario" name="usuario" required>
      <input type="checkbox" id="checkUsuario" onchange="alternarBloqueo('usuario')" tabindex="-1">
      <label for="checkUsuario">🔒</label>
    </div>

    <label for="fecha">Fecha:</label>
    <div class="campo">
      <input type="date" id="fecha" name="fecha" required>
      <input type="checkbox" id="checkFecha" onchange="alternarBloqueo('fecha')" tabindex="-1">
      <label for="checkFecha">🔒</label>
    </div>

    <label for="radiodifusora">Radiodifusora:</label>
    <div class="campo">
      <input type="text" id="radiodifusora" name="radiodifusora" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('radiodifusora','sugRadiodifusora')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkRadiodifusora" onchange="alternarBloqueo('radiodifusora')" tabindex="-1">
      <label for="checkRadiodifusora">🔒</label>
      <div id="sugRadiodifusora" class="sugerencias"></div>
    </div>

    <label for="titular">Titular:</label>
    <div class="campo">
      <textarea id="titular" name="titular" required oninput="autoResize(this)" rows="1"></textarea>
      <input type="checkbox" id="checkTitular" onchange="alternarBloqueo('titular')" tabindex="-1">
      <label for="checkTitular">🔒</label>
    </div>

    <label for="autor">Autor:</label>
    <div class="campo">
      <input type="text" id="autor" name="autor" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('autor','sugAutor')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkAutor" onchange="alternarBloqueo('autor')" tabindex="-1">
      <label for="checkAutor">🔒</label>
      <div id="sugAutor" class="sugerencias"></div>
    </div>

    <label for="programa">Programa:</label>
    <div class="campo">
      <input type="text" id="programa" name="programa" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('programa','sugPrograma')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkPrograma" onchange="alternarBloqueo('programa')" tabindex="-1">
      <label for="checkPrograma">🔒</label>
      <div id="sugPrograma" class="sugerencias"></div>
    </div>

    <label for="dependencia">Dependencia:</label>
    <div class="campo">
      <input type="text" id="dependencia" name="dependencia" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('dependencia','sugDep')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkDependencia" onchange="alternarBloqueo('dependencia')" tabindex="-1">
      <label for="checkDependencia">🔒</label>
      <div id="sugDep" class="sugerencias"></div>
    </div>

    <label for="organismo">Organismo:</label>
    <div class="campo">
      <input type="text" id="organismo" name="organismo" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('organismo','sugOrg')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkOrganismo" onchange="alternarBloqueo('organismo')" tabindex="-1">
      <label for="checkOrganismo">🔒</label>
      <div id="sugOrg" class="sugerencias"></div>
    </div>

    <label for="genero">Género:</label>
    <div class="campo">
      <input type="text" id="genero" name="genero" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('genero','sugGenero')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkGenero" onchange="alternarBloqueo('genero')" tabindex="-1">
      <label for="checkGenero">🔒</label>
      <div id="sugGenero" class="sugerencias"></div>
    </div>

    <label for="canal">Canal:</label>
    <div class="campo">
      <input type="text" id="canal" name="canal" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('canal','sugCanal')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkCanal" onchange="alternarBloqueo('canal')" tabindex="-1">
      <label for="checkCanal">🔒</label>
      <div id="sugCanal" class="sugerencias"></div>
    </div>

    <label for="tema">Tema:</label>
    <div class="campo">
      <input type="text" id="tema" name="tema" autocomplete="off">
      <button type="button" onclick="mostrarSugerencias('tema','sugTema')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkTema" onchange="alternarBloqueo('tema')" tabindex="-1">
      <label for="checkTema">🔒</label>
      <div id="sugTema" class="sugerencias"></div>
    </div>

    <label for="estatus">Estatus:</label>
    <div class="campo">
      <input type="text" id="estatus" name="estatus" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('estatus','sugEstatus')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkEstatus" onchange="alternarBloqueo('estatus')" tabindex="-1">
      <label for="checkEstatus">🔒</label>
      <div id="sugEstatus" class="sugerencias"></div>
    </div>

    <label for="municipio">Municipio:</label>
    <div class="campo">
      <input type="text" id="municipio" name="municipio" autocomplete="off" required>
      <button type="button" onclick="mostrarSugerencias('municipio','sugMunicipio')" tabindex="-1">🔽</button>
      <input type="checkbox" id="checkMunicipio" onchange="alternarBloqueo('municipio')" tabindex="-1">
      <label for="checkMunicipio">🔒</label>
      <div id="sugMunicipio" class="sugerencias"></div>
    </div>

    <label for="id">ID:</label>
    <div class="campo">
      <input type="text" id="id" name="id" autocomplete="off" required>
      <input type="checkbox" id="checkId" onchange="alternarBloqueo('id')" tabindex="-1">
      <label for="checkId">🔒</label>
    </div>

    <div class="button-group-form">
      <button type="submit" id="btnGuardar">
        <i class="fa-solid fa-floppy-disk"></i> Guardar
      </button>

      <button type="reset" id="btnLimpiar">
        <i class="fa-solid fa-broom"></i> Limpiar
      </button>

      <button type="button" id="btnExportar" onclick="exportarCSV()">
        <i class="fa-solid fa-download"></i> Exportar CSV
      </button>

      <!-- Botón dinámico para borrar nota en edición -->
      <button type="button" id="btnEliminar" style="display: none;" onclick="borrarNota()">
        <i class="fa-solid fa-trash-can"></i> Borrar Nota
      </button>

      <button type="button" id="btnBorrarTodo" onclick="borrarTodo()">
        <i class="fa-solid fa-skull-crossbones"></i> BORRAR TODO
      </button>
    </div>
  </form>


  <div id="erroresCarga" class="error-carga"></div>

  <div class="buscador-container">
    <i class="fas fa-search buscador-icon"></i>
    <input type="text" id="buscador" placeholder="Buscar en la tabla (Titular, Autor, etc.)">
  </div>

  <div class="table-header-container">
    <h2>Notas capturadas</h2>
    <div class="zoom-controls">
      <button type="button" class="btn-zoom" id="zoomOut" title="Reducir zoom">
        <i class="fa-solid fa-magnifying-glass-minus"></i>
      </button>
      <div class="zoom-display" id="zoomDisplay" title="Restablecer zoom (100%)">100%</div>
      <button type="button" class="btn-zoom" id="zoomIn" title="Aumentar zoom">
        <i class="fa-solid fa-magnifying-glass-plus"></i>
      </button>
    </div>
  </div>
  <table id="tablaNotas">
    <thead>
      <tr>
        <th data-col="ordenCaptura">
          <div class="sortable-header"># <span class="sort-icon"></span></div>
        </th>
        <th data-col="id">
          <div class="sortable-header">ID <span class="sort-icon"></span></div>
        </th>
        <th data-col="fecha">
          <div class="sortable-header">Fecha <span class="sort-icon"></span></div>
        </th>

  <script>
    let notas = [];
    let filaEnEdicion = null;
    let nextOrdenCaptura = 1;

    // CAMPOS PARA RADIO
    const camposDeDatos = ["ordenCaptura", "id", "fecha", "usuario", "radiodifusora", "titular", "autor", "programa", "dependencia", "organismo", "genero", "canal", "tema", "estatus", "municipio"];

    // ENCABEZADOS (Sin columna Telegram individual)
    const encabezadosTabla = {
      "ordenCaptura": "#", "id": "ID", "fecha": "Fecha", "usuario": "Usuario", "radiodifusora": "Radiodifusora", "titular": "Titular", "autor": "Autor",
      "programa": "Programa", "dependencia": "Dependencia", "organismo": "Organismo", "genero": "Género",
      "canal": "Canal", "tema": "Tema", "estatus": "Estatus", "municipio": "Municipio", "acciones": "Acciones"
    };

    let ordenActual = { columna: 'ordenCaptura', direccion: 'desc' };

    // RUTAS RELATIVAS (Asegúrate de que estos archivos estén en el mismo directorio)
    const urls = {
      dependencias: "./Dependencia.csv",
      radiodifusoras: "./Radiodifusora.csv",
      generos: "./Genero.csv",
      estatus: "./Estatus.csv",
      temas: "./Tema.csv",
      municipios: "./Municipio.csv",
      autores: "./Autor.csv"
    };

    // --- CONFIGURACIÓN GOOGLE APP SCRIPT ---
    // URL de despliegue proporcionada por el usuario
    const URL_APP_SCRIPT = "https://script.google.com/macros/s/AKfycbx9GDcw3-JRPulO0ThsKLk6B5OKwB5b0K-sSLWJARNLzr17hhq2pLSkC1-jNorKXjY_pg/exec";

    function autoResize(el) {
      if (!el) return;
      el.style.height = 'auto';
      el.style.height = (el.scrollHeight) + 'px';
    }

    function findKeyCaseInsensitive(map, value) {
      if (!value) return null;
      const lowerValue = value.toLowerCase();
      for (const key in map) {
        if (key.toLowerCase() === lowerValue) {
          return key;
        }
      }
      return null;
    }

    async function cargarCSV(url) {
      try {
        const urlConCacheBuster = `${url}?t=${new Date().getTime()}`;
        const res = await fetch(urlConCacheBuster);

        const contentType = res.headers.get("content-type");
        if (contentType && !contentType.includes("text/csv") && !contentType.includes("text/plain")) {
          if (contentType.includes("text/html")) {
            throw new Error(`Contenido HTML inesperado. Revise ruta: ${url}`);
          }
        }

        const buffer = await res.arrayBuffer();
        const decoder = new TextDecoder('utf-8');
        const texto = decoder.decode(buffer);
        return texto.split('\n').map(linea => linea.split(','));
      } catch (e) {
        document.getElementById("erroresCarga").innerText += `Error al cargar ${url}: ${e.message}\n`;
        return [];
      }
    }

    function limpiarFilasCSV(filas) {
      if (!filas || filas.length === 0) return [];
      filas[0][0] = filas[0][0].replace(/^\uFEFF/, "");
      const encabezado = filas[0].map(c => (c || "").toLowerCase()).join(",");
      const tieneEncabezado = encabezado.includes("dependencia") || encabezado.includes("radiodifusora") || encabezado.includes("género");
      if (tieneEncabezado) filas = filas.slice(1);
      return filas.map(r => r.map(c => (c || "").replace(/<[^>]+>/g, "").trim())).filter(r => r[0]);
    }

    async function cargarMapa(url) {
      const filas = limpiarFilasCSV(await cargarCSV(url));
      const map = {};
      filas.forEach(([clave, valor]) => {
        if (!clave) return;
        map[clave] = map[clave] || new Set();
        if (valor) map[clave].add(valor);
      });
      const claves = Object.keys(map).sort((a, b) => a.localeCompare(b, 'es'));
      const mapArrays = {};
      claves.forEach(k => mapArrays[k] = Array.from(map[k]).sort((a, b) => a.localeCompare(b, 'es')));
      return { claves, map: mapArrays };
    }

    async function cargarLista(url) {
      const filas = limpiarFilasCSV(await cargarCSV(url));
      return Array.from(new Set(filas.map(r => r[0]))).sort((a, b) => a.localeCompare(b, 'es'));
    }

    function autocompletar(idCampo, idSugerencias, lista, callback) {
      const campo = document.getElementById(idCampo);
      const contenedor = document.getElementById(idSugerencias);
      campo.dataset.lista = JSON.stringify(lista);
      let indice = -1;

      campo.addEventListener("input", () => {
        const valor = campo.value.toLowerCase().trim();
        contenedor.innerHTML = "";
        indice = -1;
        if (!valor) return;
        const sugerencias = lista.filter(item => item.toLowerCase().includes(valor));
        sugerencias.forEach((s, i) => {
          const div = document.createElement("div");
          div.textContent = s;
          div.className = "sugerencia";
          div.dataset.index = i;
          div.onclick = () => {
            campo.value = s;
            contenedor.innerHTML = "";
            if (callback) callback(s);
            // Enfocar el siguiente input al seleccionar con mouse
            focusNextInput(campo);
          };
          contenedor.appendChild(div);
        });
      });

      campo.addEventListener("keydown", e => {
        const items = contenedor.querySelectorAll(".sugerencia");
        const isEnter = e.key === "Enter";
        const isTab = e.key === "Tab";
        const isUp = e.key === "ArrowUp";
        const isDown = e.key === "ArrowDown";

        // 1. Comportamiento de flechas
        if (isDown) {
          e.preventDefault();
          if (items.length > 0) {
            indice = (indice + 1) % items.length;
            resaltar(items, indice);
          }
          return;
        } else if (isUp) {
          e.preventDefault();
          if (items.length > 0) {
            indice = (indice - 1 + items.length) % items.length;
            resaltar(items, indice);
          }
          return;
        }

        // 2. Comportamiento de Enter/Tab
        if (isEnter || isTab) {

          const focusFunction = isTab && e.shiftKey ? focusPrevInput : focusNextInput;
          let valorSeleccionado = null;

          // A. Prioridad: Sugerencia resaltada (usando flechas)
          if (indice >= 0 && items[indice]) {
            valorSeleccionado = items[indice].textContent;
          }
          // B. Selección de Sugerencia Única Visible
          else if (items.length === 1) {
            valorSeleccionado = items[0].textContent;
          }

          // C. Aplicar selección si existe
          if (valorSeleccionado) {
            campo.value = valorSeleccionado;
            if (callback) callback(campo.value);
          }

          // D. Limpia sugerencias y mueve el foco (solo si es Enter)
          contenedor.innerHTML = "";
          if (isEnter) {
            e.preventDefault(); // Prevenir el submit en caso de Enter
            focusFunction(campo);
          }
        }
      });

      campo.addEventListener("focus", () => {
        document.querySelectorAll('.sugerencias').forEach(sug => {
          if (sug.id !== idSugerencias) {
            sug.innerHTML = "";
          }
        });
      });

      campo.addEventListener("blur", () => {
        setTimeout(() => {
          if (!contenedor.contains(document.activeElement)) {
            contenedor.innerHTML = "";
          }
        }, 150);
      });

      function resaltar(items, i) {
        items.forEach(el => el.classList.remove("resaltado"));
        items[i].classList.add("resaltado");
        // Scroll para asegurar que la sugerencia esté visible
        items[i].parentElement.scrollTop = items[i].offsetTop - items[i].parentElement.offsetTop;
      }
    }

    function mostrarSugerencias(idCampo, idSugerencias) {
      const campo = document.getElementById(idCampo);
      const contenedor = document.getElementById(idSugerencias);
      document.querySelectorAll('.sugerencias').forEach(sug => sug.innerHTML = "");

      const lista = campo.dataset.lista ? JSON.parse(campo.dataset.lista) : [];
      contenedor.innerHTML = "";
      lista.forEach((s, i) => {
        const div = document.createElement("div");
        div.textContent = s;
        div.className = "sugerencia";
        div.dataset.index = i;
        div.onclick = () => {
          campo.value = s;
          contenedor.innerHTML = "";
          // Disparar blur para manejar campos dependientes (ej. Dependencia -> Organismo)
          if (idCampo === 'radiodifusora' || idCampo === 'dependencia') {
            campo.dispatchEvent(new Event('blur'));
          }
          // Enfocar el siguiente input al seleccionar con mouse
          focusNextInput(campo);
        };
        contenedor.appendChild(div);
      });
      if (lista.length > 0) {
        contenedor.style.display = 'block';
      }
    }

    function resetearEstadoEdicion() {
      filaEnEdicion = null;
      document.getElementById('btnGuardar').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar';
      document.getElementById('btnEliminar').style.display = 'none';
      document.querySelectorAll('#tablaNotas tbody tr').forEach(row => row.classList.remove('editando'));
    }

    function guardarNotas() {
      localStorage.setItem('notasCapturadas', JSON.stringify(notas));
      localStorage.setItem('nextOrdenCaptura', nextOrdenCaptura);
    }

    function borrarTodo() {
      if (confirm("¿Estás seguro de que quieres BORRAR TODAS las notas capturadas? Esta acción es irreversible.")) {
        notas = [];
        nextOrdenCaptura = 1;
        guardarNotas();
        renderizarTabla();
        resetearEstadoEdicion();
        mostrarMensaje('Todas las notas han sido borradas.', 'error');
      }
    }

    function borrarNota() {
      if (filaEnEdicion !== null) {
        const confirmar = confirm(`¿Eliminar nota #${notas[filaEnEdicion].ordenCaptura}?`);
        if (confirmar) {
          // Guardar el estado de ordenación antes de re-indexar
          const currentCol = ordenActual.columna;
          const currentDir = ordenActual.direccion;

          // 1. Eliminar la nota
          notas.splice(filaEnEdicion, 1);

          // 2. Re-indexar todas las notas correlativamente (1, 2, 3...)
          // Primero las ordenamos por su orden original para re-indexar bien
          notas.sort((a, b) => a.ordenCaptura - b.ordenCaptura);
          notas.forEach((nota, idx) => {
            nota.ordenCaptura = idx + 1;
          });

          // 3. Actualizar el contador para la siguiente nota
          nextOrdenCaptura = notas.length + 1;

          // 4. Guardar cambios
          guardarNotas();

          // 5. Restaurar la ordenación que tenía el usuario (si no era por orden de captura)
          // Si era por orden de captura, simplemente re-renderizamos con el nuevo orden
          ordenarTabla(currentCol, true);
          ordenActual.direccion = currentDir; // Mantener la dirección original si cambió por el "true"
          ordenarTabla(currentCol, false); // Aplicar de nuevo para asegurar dirección correcta

          document.querySelector("form").reset();
          resetearEstadoEdicion();
          mostrarMensaje('Nota eliminada correctamente y numeración actualizada.', 'success');
        }
      }
    }

    function contieneCamposVacios(nota) {
      // Tema es opcional, por eso se filtra aquí
      const camposARevisar = camposDeDatos.filter(c => c !== 'ordenCaptura' && c !== 'tema');
      for (const campo of camposARevisar) {
        if (!nota[campo] || (typeof nota[campo] === 'string' && nota[campo].trim() === '')) {
          return true;
        }
      }
      return false;
    }

    function renderizarTabla() {
      const tablaBody = document.getElementById("tablaNotas").querySelector("tbody");
      tablaBody.innerHTML = '';

      notas.forEach((nota, indice) => {
        const tr = document.createElement("tr");
        tr.dataset.index = notas.indexOf(nota);

        // Resaltar si hay campos vacíos obligatorios o si el Tema está vacío (Estilo Notas)
        if (contieneCamposVacios(nota) || !nota.tema || nota.tema.trim() === '') {
          tr.classList.add('alerta-vacio-row');
        }

        camposDeDatos.forEach(campo => {
          const td = document.createElement("td");
          td.textContent = nota[campo];
          if (!nota[campo] || (typeof nota[campo] === 'string' && nota[campo].trim() === '')) {
            td.classList.add('alerta-vacio');
          }
          td.setAttribute('data-label', encabezadosTabla[campo]);
          tr.appendChild(td);
        });

        const tdAcciones = document.createElement("td");
        tdAcciones.setAttribute('data-label', encabezadosTabla['acciones']);
        const btnEditar = document.createElement("button");
        btnEditar.textContent = "Editar";
        btnEditar.classList.add('btn-accion-tabla');
        btnEditar.onclick = function () { editarNota(tr); };
        tdAcciones.appendChild(btnEditar);
        tr.appendChild(tdAcciones);

        tablaBody.appendChild(tr);
      });

      // Vuelve a aplicar el filtro después de renderizar (útil para cuando se edita/guarda)
      filtrarTabla();
    }

    function cargarNotasGuardadas() {
      const datosJSON = localStorage.getItem('notasCapturadas');
      const ordenJSON = localStorage.getItem('nextOrdenCaptura');

      if (ordenJSON) nextOrdenCaptura = parseInt(ordenJSON, 10);

      if (datosJSON) {
        try {
          notas = JSON.parse(datosJSON);
          notas.forEach(nota => {
            if (!nota.ordenCaptura) nota.ordenCaptura = nextOrdenCaptura++;
          });
          ordenarTabla(ordenActual.columna, true);
        } catch (e) {
          console.error("Error al cargar notas:", e);
          notas = [];
        }
      } else {
        ordenarTabla(ordenActual.columna, true); // Renderizar tabla vacía y actualizar iconos
      }
    }

    function alternarBloqueo(idCampo) {
      const campo = document.getElementById(idCampo);
      const checkboxId = `check${idCampo.charAt(0).toUpperCase() + idCampo.slice(1)}`;
      const checkbox = document.getElementById(checkboxId);

      campo.readOnly = checkbox.checked;
      campo.classList.toggle("bloqueado", checkbox.checked);

      localStorage.setItem(`bloqueado_${idCampo}`, checkbox.checked);

      // Mantener el foco en el campo después de alternar el bloqueo
      if (campo && document.activeElement !== campo) {
        campo.focus();
      }
    }

    // --- FUNCIÓN DE MENSAJES TOAST ---
    function mostrarMensaje(mensaje, tipo = 'success') {
      const container = document.getElementById('messageContainer');
      const toast = document.createElement('div');
      toast.className = `toast-message ${tipo}`;
      
      // Iconos según el tipo
      const icono = tipo === 'success' ? '<i class="fa-solid fa-circle-check" style="color: #00a82d;"></i>' : '<i class="fa-solid fa-circle-exclamation" style="color: var(--color-error);"></i>';
      toast.innerHTML = `${icono} <span>${mensaje}</span>`;

      // Permitir cerrar al hacer clic
      toast.onclick = () => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 300);
      };

      container.appendChild(toast);

      // Auto-desaparecer después de 5 segundos
      setTimeout(() => {
        if (toast.parentNode) {
          toast.classList.add('hide');
          // Eliminar del DOM después de la transición
          toast.addEventListener('transitionend', () => {
            toast.remove();
          }, { once: true });
          
          // Fallback por si la transición falla
          setTimeout(() => {
            if (toast.parentNode) toast.remove();
          }, 500);
        }
      }, 5000);
    }

    function editarNota(tr) {
      const indice = parseInt(tr.dataset.index);
      const nota = notas[indice];

      camposDeDatos.filter(c => c !== 'ordenCaptura').forEach(id => {
        document.getElementById(id).value = nota[id];
      });

      resetearEstadoEdicion();

      document.getElementById("dependencia").dispatchEvent(new Event('blur'));
      document.getElementById("radiodifusora").dispatchEvent(new Event('blur'));

      filaEnEdicion = indice;
      document.getElementById('btnGuardar').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Actualizar Nota';
      document.getElementById('btnEliminar').style.display = 'inline-block';

      document.querySelectorAll('#tablaNotas tbody tr').forEach(row => row.classList.remove('editando'));
      tr.classList.add('editando');
      
      // Auto-resize titular al editar
      setTimeout(() => autoResize(document.getElementById('titular')), 10);
      
      window.scrollTo(0, 0);
    }

    function generarNombreArchivoCSV() {
      const usuario = document.getElementById('usuario').value.trim() || 'Desconocido';
      const usuarioLimpio = usuario.replace(/\s/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
      const fechaHoy = new Date().toISOString().slice(0, 10);
      return `${usuarioLimpio}_${fechaHoy}.csv`;
    }

    function generarCSVContenido() {
      const cabeceras = ["#", "ID", "Fecha", "Usuario", "Radiodifusora", "Titular", "Autor", "Programa", "Dependencia", "Organismo", "Género", "Canal", "Tema", "Estatus", "Municipio"];
      const filas = [cabeceras];

      notas.forEach(nota => {
        const fila = camposDeDatos.map(key => {
          let valor = nota[key] || '';
          return `"${valor.toString().replace(/"/g, '""')}"`;
        });
        filas.push(fila);
      });

      return "\uFEFF" + filas.map(f => f.join(",")).join("\n");
    }

    function exportarCSV() {
      if (notas.length === 0) {
        mostrarMensaje("No hay notas para descargar.", 'error');
        return;
      }

      const csvContenido = generarCSVContenido();
      const nombreArchivo = generarNombreArchivoCSV();

      const blob = new Blob([csvContenido], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = nombreArchivo;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      // Sincronizar automáticamente con Google Sheets
      enviarSheets();
    }

    // --- FUNCIÓN AÑADIDA: ENVIAR A GOOGLE SHEETS (JSON) ---
    async function enviarSheets() {
      if (notas.length === 0) {
        return;
      }

      const btn = document.getElementById('btnExportar');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sincronizando...';

      try {
        // Ordenamos las propiedades de los objetos explícitamente según camposDeDatos
        // Esto asegura que si Apps Script usa Object.values(), el orden sea el correcto
        const notasOrdenadas = notas.map(nota => {
          const obj = {};
          camposDeDatos.forEach(key => {
            obj[key] = nota[key] || "";
          });
          return obj;
        });

        const payload = JSON.stringify(notasOrdenadas);

        await fetch(URL_APP_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: payload
        });

        // En modo 'no-cors' no podemos leer la respuesta, pero el navegador 
        // garantiza que la petición salió de la red local.
        mostrarMensaje(`CSV descargado y notas enviadas a Google Sheets.`, 'success');
        console.log("Datos enviados como JSON raw (no-cors)");

      } catch (e) {
        console.error("Fetch error:", e);
        mostrarMensaje("CSV descargado. Error de red al sincronizar con Sheets.", 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    function ordenarTabla(columna, esInicial = false) {
      if (!columna) return;
      let direccion = 'asc';
      if (ordenActual.columna === columna && !esInicial) {
        direccion = ordenActual.direccion === 'asc' ? 'desc' : 'asc';
      } else if (esInicial && columna === 'ordenCaptura') {
        direccion = 'desc';
      }

      notas.sort((a, b) => {
        const valA = a[columna] || '';
        const valB = b[columna] || '';
        let comparacion = 0;

        if (columna === 'ordenCaptura') comparacion = valA - valB;
        else if (columna === 'fecha') {
          const dateA = new Date(valA + 'T00:00:00');
          const dateB = new Date(valB + 'T00:00:00');
          if (dateA < dateB) comparacion = -1;
          if (dateA > dateB) comparacion = 1;
        } else {
          comparacion = valA.toString().localeCompare(valB.toString(), 'es', { sensitivity: 'base' });
        }
        return direccion === 'asc' ? comparacion : -comparacion;
      });

      ordenActual = { columna, direccion };
      actualizarIndicadoresOrden();
      renderizarTabla();
    }

    function actualizarIndicadoresOrden() {
      document.querySelectorAll('#tablaNotas th[data-col]').forEach(th => {
        const headerDiv = th.querySelector('.sortable-header');
        const iconSpan = th.querySelector('.sort-icon');
        const col = th.dataset.col;
        headerDiv.classList.remove('sorted');
        iconSpan.innerHTML = '';
        if (col === ordenActual.columna) {
          headerDiv.classList.add('sorted');
          iconSpan.innerHTML = ordenActual.direccion === 'asc' ? '<i class="fas fa-sort-up"></i>' : '<i class="fas fa-sort-down"></i>';
        } else {
          iconSpan.innerHTML = '<i class="fas fa-sort"></i>';
        }
      });
    }

    // --- FUNCIÓN: BÚSQUEDA EN TIEMPO REAL ---
    function filtrarTabla() {
      const input = document.getElementById('buscador');
      const filtro = input.value.toLowerCase();
      const filas = document.getElementById('tablaNotas').querySelectorAll('tbody tr');

      filas.forEach(tr => {
        let encontrado = false;
        // Itera sobre las celdas (excepto la última, que es la de Acciones)
        for (let i = 0; i < tr.cells.length - 1; i++) {
          const textoCelda = tr.cells[i].textContent || tr.cells[i].innerText;
          if (textoCelda.toLowerCase().includes(filtro)) {
            encontrado = true;
            break;
          }
        }
        tr.style.display = encontrado ? "" : "none";
      });
    }

    // --- FUNCIÓN CORREGIDA: MOVER EL FOCO AL SIGUIENTE INPUT (INCLUYE BLOQUEADOS) ---
    function focusNextInput(currentElement) {
      const form = currentElement.form;
      if (!form) return;

      // **CORRECCIÓN:** Selecciona todos los inputs de texto y fecha, sin excepción de [readonly].
      const focusableInputs = Array.from(form.querySelectorAll('input[type="text"], input[type="date"], textarea'));

      const currentIndex = focusableInputs.indexOf(currentElement);
      if (currentIndex > -1 && currentIndex < focusableInputs.length - 1) {
        focusableInputs[currentIndex + 1].focus();
        return true;
      }

      // Si es el último input, vuelve al primero
      if (currentIndex === focusableInputs.length - 1) {
        focusableInputs[0].focus();
        return true;
      }

      return false;
    }

    // --- FUNCIÓN CORREGIDA: MOVER EL FOCO AL ANTERIOR INPUT (INCLUYE BLOQUEADOS) ---
    function focusPrevInput(currentElement) {
      const form = currentElement.form;
      if (!form) return;

      // **CORRECCIÓN:** Selecciona todos los inputs de texto y fecha, sin excepción de [readonly].
      const focusableInputs = Array.from(form.querySelectorAll('input[type="text"], input[type="date"], textarea'));

      const currentIndex = focusableInputs.indexOf(currentElement);
      if (currentIndex > 0) { // Si no es el primer elemento
        focusableInputs[currentIndex - 1].focus();
        return true;
      }

      return false;
    }

    // --- FUNCIÓN HELPER para Enter en inputs sin autocompletado ---
    function handleEnterKey(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        focusNextInput(this);
      }
    }

    // --- Eventos ---
    document.addEventListener("DOMContentLoaded", async () => {
      let orgMap, programaMap;

      const depData = await cargarMapa(urls.dependencias);
      orgMap = depData.map;
      autocompletar("dependencia", "sugDep", depData.claves, dep => {
        autocompletar("organismo", "sugOrg", orgMap[dep] || []);
      });

      const radioData = await cargarMapa(urls.radiodifusoras);
      programaMap = radioData.map;
      autocompletar("radiodifusora", "sugRadiodifusora", radioData.claves, radio => {
        const programas = programaMap[radio] || [];
        autocompletar("programa", "sugPrograma", programas);
        // Si solo hay un programa al seleccionar la radio, lo auto-rellenamos.
        if (programas.length === 1) document.getElementById("programa").value = programas[0];
      });

      // Blur events
      document.getElementById("dependencia").addEventListener("blur", (e) => {
        const val = e.target.value.trim();
        const key = findKeyCaseInsensitive(orgMap, val);
        if (key) { e.target.value = key; autocompletar("organismo", "sugOrg", orgMap[key] || []); }
        else autocompletar("organismo", "sugOrg", []);
      });

      document.getElementById("radiodifusora").addEventListener("blur", (e) => {
        const val = e.target.value.trim();
        const key = findKeyCaseInsensitive(programaMap, val);
        if (key) {
          e.target.value = key;
          const progs = programaMap[key] || [];
          autocompletar("programa", "sugPrograma", progs);
          if (progs.length === 1) document.getElementById("programa").value = progs[0];
        } else {
          autocompletar("programa", "sugPrograma", []);
        }
      });

      // Initialize dependent empty
      autocompletar("organismo", "sugOrg", []);
      autocompletar("programa", "sugPrograma", []);

      autocompletar("genero", "sugGenero", await cargarLista(urls.generos));
      autocompletar("estatus", "sugEstatus", await cargarLista(urls.estatus));
      autocompletar("tema", "sugTema", await cargarLista(urls.temas));
      autocompletar("municipio", "sugMunicipio", await cargarLista(urls.municipios));
      autocompletar("autor", "sugAutor", await cargarLista(urls.autores));
      autocompletar("canal", "sugCanal", await cargarLista("./Canal.csv"));

      // --- Listener para el buscador en tiempo real ---
      document.getElementById('buscador').addEventListener('input', filtrarTabla);

      // --- Lógica para el campo ID: Agregar N/A al empezar a escribir ---
      document.getElementById('id').addEventListener('input', function(e) {
        if (e.inputType === 'insertText' && this.value.length === 1) {
          if (this.value.toUpperCase() === 'N') {
            this.value = 'N/A';
          } else {
            this.value = 'N/A ' + this.value;
          }
        }
      });

      // --- Agregar listeners de Enter para campos sin autocompletado ---
      document.getElementById('usuario').addEventListener('keydown', handleEnterKey);
      document.getElementById('fecha').addEventListener('keydown', handleEnterKey);
      document.getElementById('id').addEventListener('keydown', handleEnterKey);
      document.getElementById('titular').addEventListener('keydown', handleEnterKey);


      // Persistence & Locks
      camposDeDatos.filter(c => c !== 'ordenCaptura').forEach(id => {
        const campo = document.getElementById(id);
        if (localStorage.getItem(id)) campo.value = localStorage.getItem(id);
        campo.addEventListener("input", () => localStorage.setItem(id, campo.value));

        const chk = document.getElementById(`check${id.charAt(0).toUpperCase() + id.slice(1)}`);
        if (chk) {
          chk.checked = localStorage.getItem(`bloqueado_${id}`) === 'true';
          alternarBloqueo(id);
        }
      });

      // Tema & Zoom
      appliedSavedTheme();
      applyZoom();

      cargarNotasGuardadas();

      document.querySelectorAll('#tablaNotas th[data-col]').forEach(th => {
        th.addEventListener('click', () => ordenarTabla(th.dataset.col));
      });

      // --- CORRECCIÓN: Manejo del RESET (Botón Limpiar) para los estilos de bloqueo ---
      document.querySelector("form").addEventListener('reset', () => {
        setTimeout(() => {
          camposDeDatos.filter(c => c !== 'ordenCaptura').forEach(id => {
            const campo = document.getElementById(id);
            const isLocked = localStorage.getItem(`bloqueado_${id}`) === 'true';

            if (!isLocked) {
              // **FIX**: Asegurar que los campos no bloqueados no tengan la clase visual gris
              campo.classList.remove("bloqueado");
              localStorage.removeItem(id); // Limpiar el valor temporal guardado
            } else {
              // Asegurar que los campos bloqueados mantengan el estilo
              campo.classList.add("bloqueado");
            }
          });
          resetearEstadoEdicion();
          const titular = document.getElementById('titular');
          titular.style.height = 'auto'; // Resetear altura
          titular.focus();
        }, 10);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.campo')) {
          document.querySelectorAll('.sugerencias').forEach(s => s.innerHTML = "");
        }
      });

      // --- Listener global para atajos de teclado ---
      document.addEventListener('keydown', (e) => {
        // Usar e.ctrlKey para Ctrl en Windows/Linux y e.metaKey para Cmd en Mac
        const isCtrlOrCmd = e.ctrlKey || e.metaKey;

        // ATALO PARA BLOQUEAR/DESBLOQUEAR (Ctrl + Shift + L)
        if (isCtrlOrCmd && e.shiftKey && e.key.toLowerCase() === 'l') {
          const activeElement = document.activeElement;
          const tagName = activeElement.tagName.toLowerCase();

          if (((tagName === 'input' && (activeElement.type === 'text' || activeElement.type === 'date')) || tagName === 'textarea') && activeElement.id) {
            e.preventDefault();

            const idCampo = activeElement.id;
            const checkboxId = `check${idCampo.charAt(0).toUpperCase() + idCampo.slice(1)}`;
            const checkbox = document.getElementById(checkboxId);

            if (checkbox) {
              // Simular el clic en el checkbox para alternar el estado
              checkbox.checked = !checkbox.checked;
              alternarBloqueo(idCampo);
            }
          }
        }

        // ATALHO PARA GUARDAR (Ctrl + Q)
        else if (isCtrlOrCmd && e.key.toLowerCase() === 'q') {
          e.preventDefault();
          // Disparar el evento submit del formulario
          const form = document.querySelector("form");
          if (form) {
            form.dispatchEvent(new Event('submit', { cancelable: true }));
          }
        }

        // ATAJO PARA DUPLICAR EL ÚLTIMO REGISTRO (Ctrl + Shift + J)
        else if (isCtrlOrCmd && e.shiftKey && e.key.toLowerCase() === 'j') {
          e.preventDefault();

          if (notas.length === 0) {
            mostrarMensaje("No hay registros para duplicar.", 'error');
            return;
          }

          // Obtiene el último registro guardado (el de mayor ordenCaptura)
          const ultimoRegistro = notas.reduce((max, nota) => nota.ordenCaptura > max.ordenCaptura ? nota : max, notas[0]);

          // Carga los valores en el formulario
          camposDeDatos.filter(c => c !== 'ordenCaptura').forEach(id => {
            const campo = document.getElementById(id);
            if (campo) {
              campo.value = ultimoRegistro[id] || '';
              // Guardar en localStorage para persistencia si no está bloqueado
              if (localStorage.getItem(`bloqueado_${id}`) !== 'true') {
                localStorage.setItem(id, campo.value);
              }
            }
          });

          // Resetea el estado de edición para que se guarde como nuevo registro
          resetearEstadoEdicion();

          // Disparar blur para cargar sugerencias dependientes
          document.getElementById("dependencia").dispatchEvent(new Event('blur'));
          document.getElementById("radiodifusora").dispatchEvent(new Event('blur'));

          // Enfoca el campo titular y ajusta altura
          const titular = document.getElementById('titular');
          if (titular) {
            titular.focus();
            autoResize(titular);
          }
          
          mostrarMensaje("Último registro duplicado y cargado en el formulario.");
        }
      });
    });

    document.querySelector("form").addEventListener("submit", e => {
      e.preventDefault();

      const form = e.currentTarget;

      // Pre-carga de nota para validación
      const nuevaNota = {};
      camposDeDatos.filter(c => c !== 'ordenCaptura').forEach(id => {
        const value = document.getElementById(id).value;
        if (id === 'titular') {
          // Reemplaza TODOS los saltos de línea (incluyendo múltiples) por un espacio único
          nuevaNota[id] = value.replace(/\r?\n|\r/g, ' ').replace(/\s+/g, ' ').trim();
        } else {
          nuevaNota[id] = value.trim();
        }
      });

      // 1. VALIDACIÓN CUSTOM (Mensaje de error si faltan campos)
      if (contieneCamposVacios(nuevaNota)) {
        // Intentar enfocar el primer campo vacío para guiar al usuario
        const primerCampoVacioId = camposDeDatos.filter(c => c !== 'ordenCaptura' && c !== 'tema').find(id => !nuevaNota[id]);
        if (primerCampoVacioId) {
          document.getElementById(primerCampoVacioId).focus();
        }
        mostrarMensaje('Por favor, complete todos los campos requeridos (excepto Tema) antes de guardar.', 'error');
        return;
      }

      // 2. Proceso de Guardado
      if (filaEnEdicion !== null) {
        notas[filaEnEdicion] = { ...nuevaNota, ordenCaptura: notas[filaEnEdicion].ordenCaptura };
        resetearEstadoEdicion();
      } else {
        nuevaNota.ordenCaptura = nextOrdenCaptura++;
        notas.push(nuevaNota);
      }

      guardarNotas();

      // Si no hay un filtro activo en el buscador, forzamos el orden por # descendente (nueva al principio)
      const filtro = document.getElementById('buscador').value.trim();
      if (filtro === '' && filaEnEdicion === null) {
        ordenarTabla('ordenCaptura', true);
      } else {
        ordenarTabla(ordenActual.columna, true);
      }

      // 3. Limpiar y enfocar
      camposDeDatos.filter(c => c !== 'ordenCaptura').forEach(id => {
        // Limpiar solo si no está bloqueado
        if (localStorage.getItem(`bloqueado_${id}`) !== 'true') {
          document.getElementById(id).value = '';
          localStorage.removeItem(id);
        }
      });

      // Mover el foco al campo Titular después de guardar
      const titular = document.getElementById('titular');
      titular.style.height = 'auto'; // Resetear altura
      titular.focus();

      // 4. MENSAJE DE ÉXITO
      mostrarMensaje('Nota guardada correctamente.', 'success');
    });

    // --- LÓGICA DE TEMA OSCURO ---
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    function appliedSavedTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        body.classList.add('dark-mode');
        themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
      } else {
        body.classList.remove('dark-mode');
        themeToggle.innerHTML = '<i class="fa-solid fa-lightbulb"></i>';
      }
    }

    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      const isDark = body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-lightbulb"></i>';
    });

    // --- LÓGICA DE ZOOM DE TABLA ---
    let tableZoom = parseFloat(localStorage.getItem('tableZoom')) || 1;
    function applyZoom() {
      document.documentElement.style.setProperty('--table-zoom', tableZoom);
      document.getElementById('zoomDisplay').textContent = `${Math.round(tableZoom * 100)}%`;
      localStorage.setItem('tableZoom', tableZoom);
    }

    document.getElementById('zoomIn').addEventListener('click', () => {
      if (tableZoom < 1.5) {
        tableZoom += 0.1;
        applyZoom();
      }
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
      if (tableZoom > 0.5) {
        tableZoom -= 0.1;
        applyZoom();
      }
    });

    document.getElementById('zoomDisplay').addEventListener('click', () => {
      tableZoom = 1;
      applyZoom();
    });
  </script>
